<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - StyleHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <i class="fas fa-tshirt"></i> StyleHub
                </a>
                <nav class="nav">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                </nav>
                <div class="header-actions">
                    <a href="cart.html" class="cart-btn">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <section class="page-header">
        <h1>Checkout</h1>
        <p>Complete your order</p>
    </section>

    <section class="checkout-section section">
        <div class="container">
            <div class="checkout-layout">
                <div class="checkout-form">
                    <h2>Shipping Information</h2>
                    <form id="checkoutForm" onsubmit="processCheckout(event)">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" required placeholder="123 Main Street">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" required placeholder="New York">
                        </div>

                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" required placeholder="+1 (555) 123-4567">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                    </form>
                </div>
                <div class="checkout-summary">
                    <h2>Order Summary</h2>
                    <div id="checkoutItems"></div>
                    <div class="checkout-totals" id="checkoutTotals"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 StyleHub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <!-- Order Success Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <i class="fas fa-check-circle"></i>
            <h2>Order Placed Successfully!</h2>
            <p>Thank you for your purchase. You will receive a confirmation email shortly.</p>
            <a href="index.html" class="btn btn-primary">Continue Shopping</a>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', renderCheckout);
    </script>
</body>
</html>
