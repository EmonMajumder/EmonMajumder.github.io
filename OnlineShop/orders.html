<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - StyleHub Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .orders-section {
            max-width: 900px;
            margin: 0 auto;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
        }

        .order-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .order-id {
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
        }

        .order-date {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .order-status {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .status-shipped {
            background: #cce5ff;
            color: #004085;
        }

        .status-processing {
            background: #fff3cd;
            color: #856404;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .order-body {
            padding: 20px 25px;
        }

        .order-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item img {
            width: 60px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
        }

        .order-item-details {
            flex: 1;
        }

        .order-item-details h4 {
            font-size: 0.95rem;
            color: var(--primary);
            margin-bottom: 3px;
        }

        .order-item-details p {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .order-item-price {
            font-weight: 700;
            color: var(--accent);
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--bg-light);
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-total {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .order-actions {
            display: flex;
            gap: 10px;
        }

        .order-actions .btn {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .status-select {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: var(--transition);
        }

        .status-select:focus {
            border-color: var(--accent);
        }

        .customer-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding: 10px 15px;
            background: #f0f4ff;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .customer-info i {
            color: var(--primary);
        }

        .customer-info span {
            color: var(--text-light);
            margin-right: 15px;
        }

        .order-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-box h3 {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .stat-box.processing { border-top: 3px solid #ffc107; }
        .stat-box.shipped { border-top: 3px solid #007bff; }
        .stat-box.delivered { border-top: 3px solid #28a745; }
        .stat-box.total-orders { border-top: 3px solid var(--accent); }

        @media (max-width: 768px) {
            .order-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .empty-orders {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-orders i {
            font-size: 4rem;
            color: var(--border);
            margin-bottom: 20px;
        }

        .empty-orders h2 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .empty-orders p {
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .orders-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .order-tracking {
            margin-top: 15px;
            padding: 15px;
            background: var(--bg-light);
            border-radius: var(--radius);
        }

        .tracking-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-top: 10px;
        }

        .tracking-steps::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 5%;
            right: 5%;
            height: 3px;
            background: var(--border);
        }

        .tracking-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            flex: 1;
        }

        .tracking-step .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: white;
            margin-bottom: 8px;
        }

        .tracking-step.completed .step-icon {
            background: #27ae60;
        }

        .tracking-step.active .step-icon {
            background: var(--accent);
            animation: pulse 1.5s infinite;
        }

        .tracking-step span {
            font-size: 0.75rem;
            color: var(--text-light);
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @media (max-width: 768px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .order-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            .tracking-steps {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .tracking-steps::before {
                display: none;
            }

            .tracking-step {
                flex-direction: row;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo"><i class="fas fa-tshirt"></i> StyleHub</a>
                <nav class="nav">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="add-product.html">Add Product</a>
                    <a href="orders.html" class="active">Orders</a>
                    <a href="contact.html">Contact</a>
                </nav>
                <div class="header-actions">
                    <a href="cart.html" class="cart-btn">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="add-product.html">Add Product</a>
        <a href="orders.html">Orders</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- Page Header -->
    <section class="page-header">
        <h1><i class="fas fa-clipboard-list"></i> Order Management</h1>
        <p>View and manage all customer orders</p>
    </section>

    <!-- Orders Section -->
    <section class="section">
        <div class="container orders-section">
            <!-- Order Stats -->
            <div class="order-stats" id="orderStats"></div>

            <!-- Filter Buttons -->
            <div class="orders-filter">
                <button class="filter-btn active" onclick="filterOrders('all', this)">All Orders</button>
                <button class="filter-btn" onclick="filterOrders('processing', this)">Processing</button>
                <button class="filter-btn" onclick="filterOrders('shipped', this)">Shipped</button>
                <button class="filter-btn" onclick="filterOrders('delivered', this)">Delivered</button>
                <button class="filter-btn" onclick="filterOrders('cancelled', this)">Cancelled</button>
            </div>

            <!-- Orders List -->
            <div class="orders-list" id="ordersList"></div>

            <!-- Empty State -->
            <div class="empty-orders" id="emptyOrders" style="display:none;">
                <i class="fas fa-box-open"></i>
                <h2>No orders found</h2>
                <p>No orders have been placed yet.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 StyleHub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Sample orders data (combined with localStorage orders)
        const sampleOrders = [];

        // Load orders from localStorage (placed via checkout)
        function getAllOrders() {
            const savedOrders = JSON.parse(localStorage.getItem('orders')) || [];
            return [...savedOrders, ...sampleOrders];
        }

        // Save status change to localStorage
        function saveOrderStatus(orderId, newStatus) {
            // Check if it's a saved order
            let savedOrders = JSON.parse(localStorage.getItem('orders')) || [];
            let found = false;
            savedOrders = savedOrders.map(order => {
                if (order.id === orderId) {
                    order.status = newStatus;
                    found = true;
                }
                return order;
            });
            if (found) {
                localStorage.setItem('orders', JSON.stringify(savedOrders));
            } else {
                // It's a sample order, save override
                let overrides = JSON.parse(localStorage.getItem('orderStatusOverrides')) || {};
                overrides[orderId] = newStatus;
                localStorage.setItem('orderStatusOverrides', JSON.stringify(overrides));
            }
        }

        // Get effective status (with overrides for sample orders)
        function getEffectiveStatus(order) {
            const overrides = JSON.parse(localStorage.getItem('orderStatusOverrides')) || {};
            return overrides[order.id] || order.status;
        }

        // Render order stats
        function renderStats() {
            const orders = getAllOrders();
            const processing = orders.filter(o => getEffectiveStatus(o) === 'processing').length;
            const shipped = orders.filter(o => getEffectiveStatus(o) === 'shipped').length;
            const delivered = orders.filter(o => getEffectiveStatus(o) === 'delivered').length;
            const total = orders.length;

            document.getElementById('orderStats').innerHTML = `
                <div class="stat-box total-orders">
                    <h3>${total}</h3>
                    <p>Total Orders</p>
                </div>
                <div class="stat-box processing">
                    <h3>${processing}</h3>
                    <p>Processing</p>
                </div>
                <div class="stat-box shipped">
                    <h3>${shipped}</h3>
                    <p>Shipped</p>
                </div>
                <div class="stat-box delivered">
                    <h3>${delivered}</h3>
                    <p>Delivered</p>
                </div>
            `;
        }

        // Render orders
        function renderOrders(filter = 'all') {
            const ordersList = document.getElementById('ordersList');
            const emptyOrders = document.getElementById('emptyOrders');
            let orders = getAllOrders();

            // Apply effective status
            orders = orders.map(o => ({ ...o, status: getEffectiveStatus(o) }));

            if (filter !== 'all') {
                orders = orders.filter(o => o.status === filter);
            }

            if (orders.length === 0) {
                ordersList.style.display = 'none';
                emptyOrders.style.display = 'block';
                return;
            }

            ordersList.style.display = 'flex';
            emptyOrders.style.display = 'none';

            ordersList.innerHTML = orders.map(order => `
                <div class="order-card" data-order-id="${order.id}">
                    <div class="order-header">
                        <div class="order-header-left">
                            <span class="order-id">${order.id}</span>
                            <span class="order-date"><i class="fas fa-calendar"></i> ${formatDate(order.date)}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <label style="font-size:0.85rem; font-weight:600; color:var(--text-light);">Status:</label>
                            <select class="status-select" onchange="changeStatus('${order.id}', this.value)">
                                <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div class="order-body">
                        <div class="customer-info">
                            <i class="fas fa-user"></i>
                            <span><strong>${order.customer ? order.customer.name : 'N/A'}</strong></span>
                            <i class="fas fa-phone"></i>
                            <span>${order.customer ? order.customer.phone : 'N/A'}</span>
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${order.customer ? order.customer.address + ', ' + order.customer.city : 'N/A'}</span>
                        </div>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <img src="${item.image}" alt="${item.name}">
                                    <div class="order-item-details">
                                        <h4>${item.name}</h4>
                                        <p>Size: ${item.size} | Qty: ${item.quantity}</p>
                                    </div>
                                    <span class="order-item-price">$${(item.price * item.quantity).toFixed(2)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="order-footer">
                        <span class="order-total">Total: $${order.total.toFixed(2)} (Shipping: ${order.shipping})</span>
                        <div class="order-actions">
                            <button class="btn btn-outline" onclick="deleteOrder('${order.id}')"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Change order status
        function changeStatus(orderId, newStatus) {
            saveOrderStatus(orderId, newStatus);
            renderStats();
            showToast(`Order ${orderId} status updated to "${capitalizeStatus(newStatus)}"`);
        }

        // Delete order
        function deleteOrder(orderId) {
            if (!confirm('Are you sure you want to delete this order?')) return;

            // Remove from saved orders
            let savedOrders = JSON.parse(localStorage.getItem('orders')) || [];
            savedOrders = savedOrders.filter(o => o.id !== orderId);
            localStorage.setItem('orders', JSON.stringify(savedOrders));

            // Remove override if exists
            let overrides = JSON.parse(localStorage.getItem('orderStatusOverrides')) || {};
            delete overrides[orderId];
            localStorage.setItem('orderStatusOverrides', JSON.stringify(overrides));

            // Re-render
            const activeFilter = document.querySelector('.filter-btn.active');
            const filter = activeFilter ? activeFilter.textContent.toLowerCase().replace(' orders', '').replace('all', 'all') : 'all';
            renderOrders(filter === 'all orders' ? 'all' : filter);
            renderStats();
            showToast('Order deleted successfully.');
        }

        // Filter orders
        function filterOrders(status, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrders(status);
        }

        // Helper functions
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function capitalizeStatus(status) {
            return status.charAt(0).toUpperCase() + status.slice(1);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderStats();
            renderOrders();
        });
    </script>
</body>
</html>
